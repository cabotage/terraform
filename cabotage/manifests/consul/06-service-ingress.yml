apiVersion: v1
kind: Service
metadata:
  labels:
    app: consul
  namespace: cabotage
  name: consul-ingress
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app: consul
  sessionAffinity: None
  type: ClusterIP
  publishNotReadyAddresses: true
status:
  loadBalancer: {}
