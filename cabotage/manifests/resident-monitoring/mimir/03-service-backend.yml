apiVersion: v1
kind: Service
metadata:
  name: resident-mimir-backend
  namespace: cabotage
  labels:
    app: resident-mimir
    component: backend
spec:
  selector:
    app: resident-mimir
    component: backend
  ports:
  - port: 8080
    targetPort: https
    name: https
  - port: 9095
    targetPort: grpc
    name: grpc
