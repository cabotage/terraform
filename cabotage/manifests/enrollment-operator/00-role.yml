apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cabotage-enrollment-operator-clusterrole
rules:
  - apiGroups: [kopf.dev]
    resources: [clusterkopfpeerings]
    verbs: [list, watch, patch, get]
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [list, watch]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [list, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create]
  - apiGroups: [cabotage.io]
    resources: [cabotageenrollments, cabotageenrollments/status]
    verbs: [list, watch, patch]
