apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-rustfs
  namespace: cabotage
spec:
  podSelector:
    matchLabels:
      app: rustfs
  ingress:
    # S3 API from registry, cabotage-app, loki, mimir
    - from:
        - podSelector:
            matchLabels:
              app: registry
        - podSelector:
            matchLabels:
              app: registry-garbage-collection
        - podSelector:
            matchLabels:
              app: resident-loki
        - podSelector:
            matchLabels:
              app: resident-mimir
        - podSelector:
            matchLabels:
              app: rustfs-admin
      ports:
        - port: 9000
          protocol: TCP
    # Console — rustfs-to-rustfs only
    - from:
        - podSelector:
            matchLabels:
              app: rustfs
      ports:
        - port: 9001
          protocol: TCP
