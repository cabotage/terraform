apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cabotageenrollments.cabotage.io
spec:
  scope: Namespaced
  group: cabotage.io
  names:
    kind: CabotageEnrollment
    plural: cabotageenrollments
    singular: cabotageenrollment
    shortNames:
      - enrollments
      - enrollment
  versions:
    - name: v1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Ready
          type: string
          description: All required consul/vault policies created
          jsonPath: .status.summary.ready
        - name: Resources
          type: string
          jsonPath: .status.summary.resources
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                inheritsFrom:
                  type: array
                  items:
                    type: object
                    required:
                      - namespace
                      - name
                    properties:
                      namespace:
                        type: string
                      name:
                        type: string
                readKeys:
                  type: object
                  description: >
                    Additional Consul/Vault key prefixes to grant read-only
                    access to. Used by cabotage-app to grant app pods access
                    to specific environment-level configuration keys.
                    Paths are provided verbatim and inserted directly into
                    Consul/Vault policies.
                  properties:
                    consul:
                      type: array
                      description: >
                        Consul key prefixes to grant read access to.
                      items:
                        type: string
                    vault:
                      type: array
                      description: >
                        Vault secret paths to grant read and list access to.
                      items:
                        type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
