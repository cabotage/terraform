apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: resident-mimir-standalone
  namespace: cabotage
  labels:
    app: resident-mimir
    component: standalone
spec:
  serviceName: resident-mimir-standalone
  replicas: 1
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: resident-mimir
      component: standalone
  template:
    metadata:
      labels:
        app: resident-mimir
        component: standalone
        ca-admission.cabotage.io: "true"
    spec:
      serviceAccountName: resident-mimir
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
      - name: mimir
        image: grafana/mimir:2.14.0
        args:
        - -config.file=/etc/mimir/mimir.yml
        - -config.expand-env=true
        - -target=all
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
%{ if !use_s3 ~}
        env:
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: rustfs-resident-mimir
              key: access-key-id
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: rustfs-resident-mimir
              key: secret-key
%{ endif ~}
        ports:
        - containerPort: 8080
          name: https
        - containerPort: 9095
          name: grpc
        - containerPort: 7946
          name: memberlist
        readinessProbe:
          httpGet:
            path: /ready
            port: https
            scheme: HTTPS
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: https
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 15
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
        volumeMounts:
        - name: config
          mountPath: /etc/mimir
        - name: tls
          mountPath: /etc/tls
          readOnly: true
        - name: data
          mountPath: /data
        - name: rules
          mountPath: /etc/mimir/rules/anonymous
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: resident-mimir-config
      - name: tls
        secret:
          secretName: resident-mimir-tls
      - name: rules
        configMap:
          name: resident-mimir-rules
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
