apiVersion: v1
kind: ConfigMap
metadata:
  name: resident-mimir-rules
  namespace: cabotage
data:
  rules.yml: |
    groups:
      - name: traefik_latency
        interval: 10s
        rules:
          - record: traefik:router_request_duration_seconds_bucket:rate30s
            expr: sum by (le, service) (rate(traefik_router_request_duration_seconds_bucket[30s]))
          - record: traefik:router_request_duration_seconds_bucket:rate1m
            expr: sum by (le, service) (rate(traefik_router_request_duration_seconds_bucket[1m]))
          - record: traefik:router_request_duration_seconds_bucket:rate5m
            expr: sum by (le, service) (rate(traefik_router_request_duration_seconds_bucket[5m]))

      - name: resident_deployment_alerts
        interval: 10s
        rules:
          - record: cabotage:resident_deployment_pod
            expr: |
              kube_pod_owner{owner_kind="ReplicaSet"}
              * on (namespace, owner_name) group_left(deployment)
              label_replace(
                label_replace(
                  kube_replicaset_owner{owner_kind="Deployment"}
                  * on (namespace, owner_name) group_left()
                  label_replace(
                    kube_deployment_labels{label_resident_deployment_cabotage_io="true"},
                    "owner_name", "$1", "deployment", "(.*)"
                  ),
                  "deployment", "$1", "owner_name", "(.*)"
                ),
                "owner_name", "$1", "replicaset", "(.*)"
              )
              and on (namespace, owner_name)
              label_replace(
                kube_replicaset_status_replicas > 0,
                "owner_name", "$1", "replicaset", "(.*)"
              )

          - alert: ResidentDeploymentOOMKilled
            expr: |
              max by (namespace, deployment) (
                (
                  max_over_time(
                    kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]
                  ) >= 1
                )
                * on (namespace, pod) group_left(deployment)
                cabotage:resident_deployment_pod
              ) > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has OOM killed pods"
              description: "A container in deployment {{ $labels.deployment }} was terminated due to OOM."

          - alert: ResidentDeploymentCrashLoopBackOff
            expr: |
              max by (namespace, deployment) (
                (
                  max_over_time(
                    kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[10m]
                  ) >= 1
                )
                * on (namespace, pod) group_left(deployment)
                cabotage:resident_deployment_pod
              ) > 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has pods in CrashLoopBackOff"
              description: "A container in deployment {{ $labels.deployment }} is in CrashLoopBackOff."

          - alert: ResidentDeploymentContainerWaiting
            expr: |
              max by (namespace, deployment) (
                (
                  max_over_time(
                    kube_pod_container_status_waiting_reason{reason!="CrashLoopBackOff"}[10m]
                  ) >= 1
                )
                * on (namespace, pod) group_left(deployment)
                cabotage:resident_deployment_pod
              ) > 0
            for: 30s
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has containers in a waiting state"
              description: "A container in deployment {{ $labels.deployment }} is waiting (e.g. ImagePullBackOff, ErrImagePull)."

          - alert: ResidentDeploymentPodNotReady
            expr: |
              max by (namespace, deployment) (
                (kube_pod_status_phase{phase=~"Failed|Unknown"} == 1)
                * on (namespace, pod) group_left(deployment)
                cabotage:resident_deployment_pod
              ) > 0
            for: 30s
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has pods in a failed state"
              description: "A pod in deployment {{ $labels.deployment }} is in Failed or Unknown phase."
