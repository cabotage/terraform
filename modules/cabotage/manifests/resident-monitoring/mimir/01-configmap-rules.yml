apiVersion: v1
kind: ConfigMap
metadata:
  name: resident-mimir-rules
  namespace: cabotage
data:
  rules.yml: |
    groups:
      - name: traefik_latency
        interval: 15s
        rules:
          - record: traefik:router_request_duration_seconds_bucket:rate30s
            expr: sum by (le, service) (rate(traefik_router_request_duration_seconds_bucket[30s]))
          - record: traefik:router_request_duration_seconds_bucket:rate1m
            expr: sum by (le, service) (rate(traefik_router_request_duration_seconds_bucket[1m]))
          - record: traefik:router_request_duration_seconds_bucket:rate5m
            expr: sum by (le, service) (rate(traefik_router_request_duration_seconds_bucket[5m]))

      - name: resident_deployment_mapping
        interval: 15s
        rules:
          - record: cabotage:resident_deployment_pod
            expr: |
              kube_pod_owner{owner_kind="ReplicaSet"}
              * on (namespace, owner_name) group_left(deployment)
              label_replace(
                label_replace(
                  kube_replicaset_owner{owner_kind="Deployment"}
                  * on (namespace, owner_name) group_left()
                  label_replace(
                    kube_deployment_labels{label_resident_deployment_cabotage_io="true"},
                    "owner_name", "$1", "deployment", "(.*)"
                  ),
                  "deployment", "$1", "owner_name", "(.*)"
                ),
                "owner_name", "$1", "replicaset", "(.*)"
              )
              and on (namespace, owner_name)
              label_replace(
                kube_replicaset_status_replicas > 0,
                "owner_name", "$1", "replicaset", "(.*)"
              )

      - name: resident_deployment_crashes
        interval: 15s
        rules:
          - alert: ResidentDeploymentCrashLooping
            expr: |
              (
                increase(kube_pod_container_status_restarts_total[3m]) > 0
              )
              * on (namespace, pod) group_left(deployment)
              cabotage:resident_deployment_pod
            for: 30s
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has crash looping pods"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} (deployment {{ $labels.deployment }}) has restarted {{ $value }} time(s) in the last 3 minutes."

          - alert: ResidentDeploymentOOMKilled
            expr: |
              kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}
              * on (namespace, pod) group_left(deployment)
              cabotage:resident_deployment_pod
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has OOM killed pods"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} (deployment {{ $labels.deployment }}) was terminated due to OOM."

          - alert: ResidentDeploymentPodNotReady
            expr: |
              (
                kube_pod_status_phase{phase=~"Failed|Unknown"} == 1
              )
              * on (namespace, pod) group_left(deployment)
              cabotage:resident_deployment_pod
            for: 30s
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has pods in {{ $labels.phase }} state"
              description: "Pod {{ $labels.pod }} (deployment {{ $labels.deployment }}) has been in {{ $labels.phase }} phase for more than 30 seconds."

          - alert: ResidentDeploymentCrashLoopBackOff
            expr: |
              kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}
              * on (namespace, pod) group_left(deployment)
              cabotage:resident_deployment_pod
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has pods in CrashLoopBackOff"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} (deployment {{ $labels.deployment }}) has been in CrashLoopBackOff for more than 30 seconds."
