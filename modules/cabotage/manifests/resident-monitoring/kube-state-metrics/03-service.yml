apiVersion: v1
kind: Service
metadata:
  name: resident-kube-state-metrics
  namespace: cabotage
  labels:
    app: resident-kube-state-metrics
spec:
  ports:
  - name: https-metrics
    port: 8080
    targetPort: https-metrics
  - name: telemetry
    port: 8081
    targetPort: telemetry
  selector:
    app: resident-kube-state-metrics
