apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: resident-loki-write
  namespace: cabotage
  labels:
    app: resident-loki
    component: write
spec:
  serviceName: resident-loki-write
  replicas: 1
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: resident-loki
      component: write
  template:
    metadata:
      labels:
        app: resident-loki
        component: write
        ca-admission.cabotage.io: "true"
    spec:
      serviceAccountName: resident-loki
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: resident-loki
                  component: write
              topologyKey: failure-domain.beta.kubernetes.io/zone
      containers:
      - name: loki
        image: grafana/loki:3.4.2
        args:
        - -config.file=/etc/loki/loki.yml
        - -config.expand-env=true
        - -target=write
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: rustfs-resident-loki
              key: access-key-id
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: rustfs-resident-loki
              key: secret-key
        ports:
        - containerPort: 3100
          name: https
        - containerPort: 9095
          name: grpc
        - containerPort: 7946
          name: memberlist
        readinessProbe:
          httpGet:
            path: /ready
            port: https
            scheme: HTTPS
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: https
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 15
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        - name: tls
          mountPath: /etc/tls
          readOnly: true
        - name: data
          mountPath: /loki
      volumes:
      - name: config
        configMap:
          name: resident-loki-config
      - name: tls
        secret:
          secretName: resident-loki-tls
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
