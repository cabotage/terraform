apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: resident-alloy
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]
