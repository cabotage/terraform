apiVersion: v1
kind: ConfigMap
metadata:
  name: resident-alloy-fargate-config
  namespace: cabotage
data:
  config.alloy: |
    logging {
      level = "info"
      format = "logfmt"
    }

    // Discover fargate pods by label (no node filter — pods run on Fargate)
    discovery.kubernetes "fargate_pods" {
      role = "pod"
      selectors {
        role  = "pod"
        label = "fargate-pod.cabotage.io=true"
      }
    }

    discovery.relabel "fargate_pods" {
      targets = discovery.kubernetes.fargate_pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod_name"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container_name"
      }

      rule {
        action = "labelmap"
        regex = "__meta_kubernetes_pod_label_(app|organization|project|application|process|environment|release|deployment)"
      }
    }

    loki.source.kubernetes "fargate_pods" {
      targets    = discovery.relabel.fargate_pods.output
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "https://resident-loki-write.cabotage.svc.cluster.local:3100/loki/api/v1/push"
        tls_config {
          ca_file = "/var/run/secrets/cabotage.io/ca.crt"
        }
      }
    }
