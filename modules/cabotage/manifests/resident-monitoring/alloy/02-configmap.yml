apiVersion: v1
kind: ConfigMap
metadata:
  name: resident-alloy-config
  namespace: cabotage
data:
  config.alloy: |
    logging {
      level = "info"
      format = "logfmt"
    }

    // Discover resident pods on this node only
    discovery.kubernetes "resident_pods" {
      role = "pod"
      selectors {
        role  = "pod"
        label = "resident-pod.cabotage.io=true"
        field = "spec.nodeName=" + coalesce(env("HOSTNAME"), constants.hostname)
      }
    }

    discovery.relabel "resident_pods" {
      targets = discovery.kubernetes.resident_pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name", "__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        regex         = "(.+)/(.+)/(.+)/(.+)"
        target_label  = "__path__"
        replacement   = "/var/log/pods/${1}_${2}_${3}/${4}/*.log"
      }

      rule {
        action = "labelmap"
        regex = "__meta_kubernetes_(namespace|pod_(name|node_name|container_name|container_image))"
      }

      rule {
        action = "labelmap"
        regex = "__meta_kubernetes_pod_label_(app|organization|project|application|process|environment|release|deployment)"
      }
    }

    // --- Metrics: scrape cAdvisor from kubelets for pod CPU/memory/network ---

    discovery.relabel "cadvisor" {
      targets = [{
        "__name__" = "cadvisor",
      }]

      rule {
        target_label = "__address__"
        replacement  = "kubernetes.default.svc:443"
      }

      rule {
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/" + coalesce(env("HOSTNAME"), constants.hostname) + "/proxy/metrics/cadvisor"
      }
    }

    prometheus.scrape "cadvisor" {
      targets      = discovery.relabel.cadvisor.output
      scheme       = "https"
      scrape_interval = "10s"

      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"

      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
      }

      forward_to = [prometheus.relabel.cadvisor.receiver]
    }

    prometheus.relabel "cadvisor" {
      // Keep container metrics we care about
      rule {
        source_labels = ["__name__"]
        regex  = "container_cpu_usage_seconds_total|container_cpu_cfs_throttled_seconds_total|container_cpu_cfs_throttled_periods_total|container_cpu_cfs_periods_total|container_cpu_system_seconds_total|container_cpu_user_seconds_total|container_cpu_load_average_10s|container_memory_working_set_bytes|container_memory_usage_bytes|container_memory_rss|container_memory_cache|container_memory_swap|container_memory_kernel_usage|container_memory_mapped_file|container_memory_max_usage_bytes|container_memory_failcnt|container_spec_memory_limit_bytes|container_oom_events_total|container_network_receive_bytes_total|container_network_transmit_bytes_total|container_network_receive_packets_total|container_network_transmit_packets_total|container_network_receive_errors_total|container_network_transmit_errors_total|container_network_receive_packets_dropped_total|container_network_transmit_packets_dropped_total|container_fs_usage_bytes|container_fs_limit_bytes|container_fs_reads_bytes_total|container_fs_writes_bytes_total|container_fs_reads_total|container_fs_writes_total|container_fs_io_time_seconds_total|container_fs_inodes_total|container_fs_inodes_free|container_processes|container_threads|container_file_descriptors|container_sockets|container_start_time_seconds"
        action = "keep"
      }

      // Drop metrics without a pod label (node-level aggregates)
      rule {
        source_labels = ["pod"]
        regex  = ""
        action = "drop"
      }

      forward_to = [prometheus.remote_write.default.receiver]
    }

    prometheus.remote_write "default" {
      endpoint {
        url = "https://resident-mimir-write.cabotage.svc.cluster.local:8080/api/v1/push"
        tls_config {
          ca_file = "/var/run/secrets/cabotage.io/ca.crt"
        }
      }
    }

    // --- Metrics: scrape traefik for per-service request metrics ---

    discovery.kubernetes "traefik" {
      role = "pod"
      namespaces {
        names = ["traefik"]
      }
      selectors {
        role  = "pod"
        label = "app.kubernetes.io/name=traefik"
        field = "spec.nodeName=" + coalesce(env("HOSTNAME"), constants.hostname)
      }
    }

    discovery.relabel "traefik" {
      targets = discovery.kubernetes.traefik.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_ip"]
        target_label  = "__address__"
        replacement   = "$1:9100"
      }

      rule {
        target_label = "__metrics_path__"
        replacement  = "/metrics"
      }

      rule {
        action = "labelmap"
        regex = "__meta_kubernetes_pod_label_(environment)"
      }
    }

    prometheus.scrape "traefik" {
      targets         = discovery.relabel.traefik.output
      scrape_interval = "10s"
      forward_to      = [prometheus.relabel.traefik.receiver]
    }

    prometheus.relabel "traefik" {
      rule {
        source_labels = ["__name__"]
        regex  = "traefik_entrypoint_requests_total|traefik_entrypoint_request_duration_seconds_bucket|traefik_entrypoint_request_duration_seconds_count|traefik_entrypoint_request_duration_seconds_sum|traefik_entrypoint_requests_bytes_total|traefik_entrypoint_responses_bytes_total|traefik_open_connections|traefik_service_requests_total|traefik_service_request_duration_seconds_bucket|traefik_service_request_duration_seconds_count|traefik_service_request_duration_seconds_sum|traefik_service_requests_bytes_total|traefik_service_responses_bytes_total|traefik_service_open_connections|traefik_router_requests_total|traefik_router_request_duration_seconds_bucket|traefik_router_request_duration_seconds_count|traefik_router_request_duration_seconds_sum|traefik_router_requests_bytes_total|traefik_router_responses_bytes_total|traefik_router_open_connections|traefik_tls_certs_not_after"
        action = "keep"
      }

      forward_to = [prometheus.remote_write.default.receiver]
    }

    // --- Logs: collect traefik access logs ---

    discovery.relabel "traefik_logs" {
      targets = discovery.kubernetes.traefik.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name", "__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        regex         = "(.+)/(.+)/(.+)/(.+)"
        target_label  = "__path__"
        replacement   = "/var/log/pods/${1}_${2}_${3}/${4}/*.log"
      }

      rule {
        target_label = "job"
        replacement  = "traefik"
      }
    }

    local.file_match "traefik" {
      path_targets = discovery.relabel.traefik_logs.output
    }

    loki.source.file "traefik" {
      targets    = local.file_match.traefik.targets
      forward_to = [loki.process.traefik_logs.receiver]

      file_watch {
        min_poll_frequency = "250ms"
        max_poll_frequency = "5s"
      }
    }

    loki.process "traefik_logs" {
      // Strip CRI log prefix (timestamp stdout F) to get raw JSON
      stage.regex {
        expression = "^[^ ]+ (stdout|stderr) [^ ]+ (?P<content>.*)$"
      }

      stage.output {
        source = "content"
      }

      // Parse the traefik JSON access log
      stage.json {
        expressions = {
          service_name = "ServiceName",
          router_name  = "RouterName",
          request_host = "RequestHost",
          status       = "OriginStatus",
        }
      }

      stage.labels {
        values = {
          service_name = "",
          router_name  = "",
          request_host = "",
          status       = "",
        }
      }

      forward_to = [loki.write.default.receiver]
    }

    // --- Logs: collect from node filesystem for resident pods ---

    local.file_match "resident_pods" {
      path_targets = discovery.relabel.resident_pods.output
    }

    loki.source.file "resident_pods" {
      targets    = local.file_match.resident_pods.targets
      forward_to = [loki.process.resident_pods.receiver]

      file_watch {
        min_poll_frequency = "250ms"
        max_poll_frequency = "5s"
      }
    }

    loki.process "resident_pods" {
      stage.labels {
        values = {
          namespace      = "namespace",
          pod_name       = "pod_name",
          container_name = "pod_container_name",
        }
      }

      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "https://resident-loki-write.cabotage.svc.cluster.local:3100/loki/api/v1/push"
        tls_config {
          ca_file = "/var/run/secrets/cabotage.io/ca.crt"
        }
      }
    }
